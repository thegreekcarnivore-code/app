# ============================================================
# Nginx — app.thegreekcarnivore.com (PRODUCTION)
# ============================================================
# Copy to: /etc/nginx/sites-available/app.thegreekcarnivore.com
# Enable:  ln -s /etc/nginx/sites-available/app.thegreekcarnivore.com /etc/nginx/sites-enabled/
# SSL:     certbot --nginx -d app.thegreekcarnivore.com
# ============================================================
#
# WARNING: Do NOT enable this until staging is fully tested.
# DNS must be pointed to this VPS before SSL will work.
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name app.thegreekcarnivore.com;

    root /srv/thegreekcarnivore-app/dist;
    index index.html;

    # ── SPA routing ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /recipes/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /covers/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Service worker — never cache ─────────────────────
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /manifest.json {
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── Security headers ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip compression ─────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Logging ──────────────────────────────────────────
    access_log /var/log/nginx/thegreekcarnivore.access.log;
    error_log  /var/log/nginx/thegreekcarnivore.error.log;
}
