# ============================================================
# Nginx — staging.app.thegreekcarnivore.com
# ============================================================
# Copy to: /etc/nginx/sites-available/staging.app.thegreekcarnivore.com
# Enable:  ln -s /etc/nginx/sites-available/staging.app.thegreekcarnivore.com /etc/nginx/sites-enabled/
# SSL:     certbot --nginx -d staging.app.thegreekcarnivore.com
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name staging.app.thegreekcarnivore.com;

    root /srv/thegreekcarnivore-app/dist;
    index index.html;

    # ── HTML entry point — never cache ─────────────────
    # Ensures users always get the latest index.html after deploy.
    # Hashed JS/CSS assets are still cached aggressively via /assets/.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── SPA routing ──────────────────────────────────────
    # All routes fall back to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────
    # Vite hashes filenames, so we can cache aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Recipe & cover images ────────────────────────────
    location /recipes/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /covers/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Service worker — never cache ─────────────────────
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Manifest — short cache ───────────────────────────
    location = /manifest.json {
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── Security headers ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Logging ──────────────────────────────────────────
    access_log /var/log/nginx/staging.thegreekcarnivore.access.log;
    error_log  /var/log/nginx/staging.thegreekcarnivore.error.log;
}
